<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link href='https://i.ibb.co/JwWLTZ8N/20260512-224845.png' rel='icon' type='image/x-icon'/>
<link href='https://i.ibb.co/JwWLTZ8N/20260512-224845.png' rel='icon' sizes='32x32' type='image/png'/>
<link href='https://i.ibb.co/JwWLTZ8N/20260512-224845.png' rel='icon' sizes='16x16' type='image/png'/>
<meta content='#111827' name='theme-color'/>
<meta content='#111827' name='msapplication-navbutton-color'/>
<meta content='yes' name='apple-mobile-web-app-capable'/>
<meta content='#111827' name='apple-mobile-web-app-status-bar-style'/>
<title>Xuroni</title>
<style>
  /* Premium Dark UI/UX Design Variables */
  :root {
    --bg-primary: #0b0f19; /* Deep cosmic dark */
    --card-bg: #111827; /* Rich slate dark */
    --text-main: #f8fafc; /* High contrast off-white */
    --text-muted: #94a3b8; /* Cool gray muted text */
    --accent-color: #6366f1; /* Neon Indigo */
    --accent-light: rgba(99, 102, 241, 0.15); /* Translucent glow indigo */
    --border-color: #1e293b; /* Sleek dark border */
    --border-hover: #334155;
    --shadow-sm: 0 4px 6px -1px rgba(0, 0, 0, 0.2), 0 2px 4px -1px rgba(0, 0, 0, 0.14);
    --shadow-md: 0 12px 30px -5px rgba(0, 0, 0, 0.5), 0 0 15px 0 rgba(99, 102, 241, 0.1);
    --radius-lg: 16px;
    --radius-md: 12px;
    --font-stack: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
  }

  body {
    background-color: var(--bg-primary);
    margin: 0;
    padding: 0;
  }

  #blogger-sitemap-app {
    font-family: var(--font-stack);
    color: var(--text-main);
    max-width: 760px;
    margin: 40px auto;
    padding: 0 16px;
    background-color: var(--bg-primary);
    -webkit-font-smoothing: antialiased;
  }

  /* --- Brand Header Section (Left/Right Layout) --- */
  .brand-header {
    display: flex;
    flex-direction: row;
    align-items: center;
    justify-content: space-between;
    gap: 16px;
    margin-bottom: 32px;
    padding-bottom: 20px;
    border-bottom: 1px solid var(--border-color);
  }
  .brand-logo-wrapper {
    max-width: 140px;
    display: flex; border-radius:50%;
    align-items: center;border:2px solid var(--border-color);
    
  }
  .brand-logo {
    width: 100%; border-radius:50%;
    height: auto;filter: grayscale(100%);
    max-height: 40px;
    object-fit: contain;
  }
  
  /* Modern Compact Social Icons Row */
  .social-connect-bar {
    display: flex;
    gap: 8px;
    align-items: center;
  }
  .social-icon-btn {
    display: flex;
    align-items: center;
    justify-content: center;
    width: 36px;
    height: 36px;
    background: var(--card-bg);
    border: 1px solid var(--border-color);
    border-radius: 50%;
    color: var(--text-muted);
    transition: all 0.25s cubic-bezier(0.4, 0, 0.2, 1);
    text-decoration: none;
  }
  .social-icon-btn svg {
    width: 16px;
    height: 16px;
    fill: currentColor;
  }
  .social-icon-btn:hover {
    color: var(--text-main);
    background-color: var(--accent-light);
    border-color: var(--accent-color);
    transform: translateY(-2px);
    box-shadow: 0 4px 10px rgba(99, 102, 241, 0.2);
  }

  /* Animated Shimmer Loader */
  .premium-loader {
    text-align: center;
    padding: 60px 20px;
    background: var(--card-bg);
    border-radius: var(--radius-lg);
    box-shadow: var(--shadow-sm);
    border: 1px solid var(--border-color);
  }
  .loader-spinner {
    width: 28px;
    height: 28px;
    border: 3px solid var(--border-color);
    border-top-color: var(--accent-color);
    border-radius: 50%;
    margin: 0 auto 16px;
    animation: spin 0.8s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  /* Section Title styling */
  .sitemap-header {
    margin-bottom: 24px;
    text-align: left;
  }
  .sitemap-header p {
    font-size: 18px; text-decoration:none;
    color: var(--text-muted);
    margin:22px 4px;line-height:1.5;
    font-weight: 700;
  }

  /* Search Box Container */
  .sitemap-search-wrapper {
    position: relative;
    margin-bottom: 24px;
  }
  .sitemap-search-input {
    width: 100%;
    padding: 15px 16px 15px 46px;
    font-size: 15px;
    font-family: var(--font-stack);
    color: var(--text-main);
    background: var(--card-bg);
    border: 1px solid var(--border-color);
    border-radius: var(--radius-md);
    box-shadow: var(--shadow-sm);
    box-sizing: border-box;
    outline: none;
    transition: all 0.25s ease;
  }
  .sitemap-search-input::placeholder {
    color: var(--text-muted);
    opacity: 0.7;
  }
  .sitemap-search-input:focus {
    border-color: var(--accent-color);
    background-color: #151d30;
    box-shadow: 0 0 0 4px rgba(99, 102, 241, 0.2);
  }
  .sitemap-search-icon {
    position: absolute;
    left: 16px;
    top: 50%;
    transform: translateY(-50%);
    width: 18px;
    height: 18px;
    fill: none;
    stroke: var(--text-muted);
    stroke-width: 2.5;
    stroke-linecap: round;
    stroke-linejoin: round;
    pointer-events: none;
    transition: stroke 0.2s ease;
  }
  .sitemap-search-input:focus + .sitemap-search-icon {
    stroke: var(--accent-color);
  }

  /* Accordion Item Wrapper */
  .sitemap-accordion {
    background: var(--card-bg);
    border: 1px solid var(--border-color);
    border-radius: var(--radius-lg);
    margin-bottom: 14px;
    box-shadow: var(--shadow-sm);
    transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
    overflow: hidden;
  }
  .sitemap-accordion:hover {
    box-shadow: var(--shadow-md);
    border-color: var(--border-hover);
    transform: translateY(-1px);
  }

  /* Trigger Header Button */
  .accordion-trigger {
    width: 100%;
    background: none;
    border: none;
    padding: 20px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    cursor: pointer;
    text-align: left;
    outline: none;
  }

  .trigger-left {
    display: flex;
    align-items: center;
    gap: 12px;
  }

  .category-title {
    font-size: 16px;
    font-weight: 600;
    color: var(--text-main);
    letter-spacing: -0.01em;
  }

  .post-count-badge {
    background: var(--accent-light);
    color: #a5b4fc;
    font-size: 12px;
    font-weight: 600;
    padding: 3px 10px;
    border-radius: 20px;
  }

  /* Premium SVG Chevron Indicator */
  .chevron-icon {
    width: 20px;
    height: 20px;
    fill: none;
    stroke: var(--text-muted);
    stroke-width: 2;
    stroke-linecap: round;
    stroke-linejoin: round;
    transition: transform 0.3s cubic-bezier(0.4, 0, 0.2, 1);
  }

  /* Content Panel with Smooth Slide Drawer */
  .accordion-panel {
    max-height: 0;
    overflow: hidden;
    transition: max-height 0.35s cubic-bezier(0.4, 0, 0.2, 1);
    background-color: #0f1524;
  }

  /* Active Open States */
  .sitemap-accordion.is-open {
    border-color: rgba(99, 102, 241, 0.4);
    box-shadow: var(--shadow-md);
  }
  .sitemap-accordion.is-open .chevron-icon {
    transform: rotate(180deg);
    stroke: var(--accent-color);
  }
  .sitemap-accordion.is-open .accordion-panel {
    border-top: 1px solid var(--border-color);
  }

  /* Post Links List */
  .posts-list {
    list-style: none;
    margin: 0;
    padding: 8px 0;
  }

  .post-item-link {
    display: flex;
    align-items: center;
    padding: 14px 24px;
    color: #cbd5e1;
    text-decoration: none;
    font-size: 14.5px;
    font-weight: 400;
    line-height: 1.5;
    transition: all 0.2s ease;
    word-break: break-word;
  }
  
  .post-item-link:hover {
    background-color: rgba(255, 255, 255, 0.02);
    color: var(--accent-color);
    padding-left: 28px;
  }

  /* Responsive Adjustments */
  @media (min-width: 640px) {
    .brand-logo-wrapper { max-width: 180px; }
    .brand-logo { max-height: 50px; }
    .social-connect-bar { gap: 12px; }
    .social-icon-btn { width: 40px; height: 40px; }
    .social-icon-btn svg { width: 18px; height: 18px; }
    .category-title { font-size: 17px; }
    .post-item-link { font-size: 15px; }
  }
</style>
</head>
<body>

<div id="blogger-sitemap-app">
  
  <!-- Premium Header Branding (Left/Right Layout) -->
  <header class="brand-header">
    <div class="brand-logo-wrapper">
      <!-- PLACE YOUR IMAGE LOGO URL IN THE SRC BELOW -->
      <img src="https://i.ibb.co/W457x2QS/IMG-20260420-172501.webp" alt="Gauranga" class="brand-logo">
    </div>
    
    <div class="social-connect-bar">
      <!-- Facebook -->
      <a href="https://facebook.com/gauranga.info" target="_blank" class="social-icon-btn" aria-label="Facebook">
        <svg viewBox="0 0 24 24"><path d="M22 12c0-5.52-4.48-10-10-10S2 6.48 2 12c0 4.84 3.44 8.87 8 9.8V15H8v-3h2V9.5C10 7.57 11.57 6 13.5 6H16v3h-2c-.55 0-1 .45-1 1v2h3v3h-3v6.95c4.56-.93 8-4.96 8-9.75z"/></svg>
      </a>
      <!-- Instagram -->
      <a href="https://instagram.com/imgauranga" target="_blank" class="social-icon-btn" aria-label="Instagram">
        <svg viewBox="0 0 24 24"><path d="M12 2.163c3.204 0 3.584.012 4.85.07 3.252.148 4.771 1.691 4.919 4.919.058 1.265.069 1.645.069 4.849 0 3.205-.012 3.584-.069 4.849-.149 3.225-1.664 4.771-4.919 4.919-1.266.058-1.644.07-4.85.07-3.204 0-3.584-.012-4.849-.07-3.26-.149-4.771-1.699-4.919-4.92-.058-1.265-.07-1.644-.07-4.849 0-3.204.013-3.583.07-4.849.149-3.227 1.664-4.771 4.919-4.919 1.266-.057 1.645-.069 4.849-.069zM12 0C8.741 0 8.333.014 7.053.072 2.695.272.273 2.69.073 7.051.014 8.333 0 8.741 0 12c0 3.259.014 3.668.072 4.948.2 4.358 2.618 6.78 6.98 6.98 1.281.058 1.689.072 4.948.072 3.259 0 3.668-.014 4.948-.072 4.354-.2 6.782-2.618 6.979-6.98.059-1.28.073-1.689.073-4.948 0-3.259-.014-3.667-.072-4.947-.196-4.354-2.617-6.78-6.979-6.98C15.668.014 15.259 0 12 0zm0 5.838a6.162 6.162 0 100 12.324 6.162 6.162 0 000-12.324zM12 16a4 4 0 110-8 4 4 0 010 8zm6.406-11.845a1.44 1.44 0 100 2.881 1.44 1.44 0 000-2.881z"/></svg>
      </a>
      <!-- YouTube -->
      <a href="https://youtube.com/@xuroni" target="_blank" class="social-icon-btn" aria-label="YouTube">
        <svg viewBox="0 0 24 24"><path d="M23.498 6.186a3.016 3.016 0 00-2.122-2.136C19.505 3.545 12 3.545 12 3.545s-7.505 0-9.377.505A3.017 3.017 0 00.502 6.186C0 8.07 0 12 0 12s0 3.93.502 5.814a3.016 3.016 0 002.122 2.136c1.871.505 9.376.505 9.376.505s7.505 0 9.377-.505a3.015 3.015 0 002.122-2.136C24 15.93 24 12 24 12s0-3.93-.502-5.814zM9.545 15.568V8.432L15.818 12l-6.273 3.568z"/></svg>

  </header>

  <div class="sitemap-header">
    <p id="sitemap-meta" style="display:none">Loading structured content...</p>
  </div>
  
  <!-- Premium Dark Search Bar Component -->
  <div class="sitemap-search-wrapper" id="search-wrapper" style="display: none;">
    <input type="text" id="sitemap-search" class="sitemap-search-input" placeholder="Search">
    <svg class="sitemap-search-icon" viewBox="0 0 24 24"><circle cx="11" cy="11" r="8"></circle><line x1="21" y1="21" x2="16.65" y2="16.65"></line></svg>
  </div>
  
  <div id="sitemap-container">
    <div class="premium-loader">
      <div class="loader-spinner"></div>
      <div style="font-size: 14px; color: var(--text-muted); font-weight: 500;">Architecting index layout...</div>
    </div>
  </div>
</div>

<script>
// --- PREMIUM CONFIGURATION ---
const bloggerUrl = "https://xuroni.blogspot.com"; 
// -----------------------------

const maxResults = 650; 
let totalPostsFetched = 0;
let mapData = {};

function startSitemapFetch() {
  fetchFeed(1);
}

function fetchFeed(startIndex) {
  const script = document.createElement('script');
  script.src = `${bloggerUrl}/feeds/posts/summary?alt=json-in-script&start-index=${startIndex}&max-results=${maxResults}&callback=parseSitemapData`;
  document.body.appendChild(script);
}

function parseSitemapData(json) {
  const entries = json.feed.entry || [];
  totalPostsFetched += entries.length;

  entries.forEach(entry => {
    let title = entry.title.$t;
    let postUrl = "";
    
    for (let k = 0; k < entry.link.length; k++) {
      if (entry.link[k].rel === 'alternate') {
        postUrl = entry.link[k].href;
        break;
      }
    }

    if (!postUrl) return;

    if (entry.category && entry.category.length > 0) {
      entry.category.forEach(cat => {
        let labelName = cat.term;
        if (!mapData[labelName]) mapData[labelName] = [];
        if(!mapData[labelName].some(p => p.url === postUrl)) {
          mapData[labelName].push({ title: title, url: postUrl });
        }
      });
    } else {
      if (!mapData["Uncategorized"]) mapData["Uncategorized"] = [];
      mapData["Uncategorized"].push({ title: title, url: postUrl });
    }
  });

  if (entries.length === maxResults) {
    fetchFeed(totalPostsFetched + 1);
  } else {
    renderPremiumSitemap();
  }
}

function renderPremiumSitemap() {
  const container = document.getElementById('sitemap-container');
  const metaText = document.getElementById('sitemap-meta');
  const searchWrapper = document.getElementById('search-wrapper');
  container.innerHTML = ''; 

  const sortedLabels = Object.keys(mapData).sort();

  if (sortedLabels.length === 0) {
    container.innerHTML = '<div class="premium-loader"><div style="color: var(--text-muted);">No published articles discovered.</div></div>';
    return;
  }

  searchWrapper.style.display = 'block';
  metaText.style.display = 'block';

  let grandTotal = Object.values(mapData).reduce((acc, cur) => acc + cur.length, 0);
  metaText.textContent = ``;

  sortedLabels.forEach((label, index) => {
    mapData[label].sort((a, b) => a.title.localeCompare(b.title));

    const card = document.createElement('div');
    card.className = 'sitemap-accordion';
    
    const trigger = document.createElement('button');
    trigger.className = 'accordion-trigger';
    trigger.setAttribute('aria-expanded', 'false');
    
    trigger.innerHTML = `
      <div class="trigger-left">
        <span class="category-title">${label}</span>
        <span class="post-count-badge">${mapData[label].length}</span>
      </div>
      <svg class="chevron-icon" viewBox="0 0 24 24"><polyline points="6 9 12 15 18 9"></polyline></svg>
    `;

    const panel = document.createElement('div');
    panel.className = 'accordion-panel';
    
    const ul = document.createElement('ul');
    ul.className = 'posts-list';

    mapData[label].forEach(post => {
      const li = document.createElement('li');
      const a = document.createElement('a');
      a.className = 'post-item-link';
      a.href = post.url;
      a.textContent = post.title;
      a.target = "_blank"; 
      
      li.appendChild(a);
      ul.appendChild(li);
    });

    panel.appendChild(ul);
    card.appendChild(trigger);
    card.appendChild(panel);
    container.appendChild(card);

    trigger.addEventListener('click', () => {
      const isOpen = card.classList.contains('is-open');
      
      document.querySelectorAll('.sitemap-accordion').forEach(el => {
        el.classList.remove('is-open');
        el.querySelector('.accordion-panel').style.maxHeight = null;
        el.querySelector('.accordion-trigger').setAttribute('aria-expanded', 'false');
      });

      if (!isOpen) {
        card.classList.add('is-open');
        trigger.setAttribute('aria-expanded', 'true');
        panel.style.maxHeight = panel.scrollHeight + "px";
      }
    });
  });

  // --- Search Logic ---
  const searchInput = document.getElementById('sitemap-search');
  searchInput.addEventListener('input', function() {
    const query = this.value.toLowerCase().trim();
    const accordions = container.querySelectorAll('.sitemap-accordion');

    accordions.forEach(card => {
      const links = card.querySelectorAll('.post-item-link');
      const panel = card.querySelector('.accordion-panel');
      const trigger = card.querySelector('.accordion-trigger');
      let visibleCount = 0;

      links.forEach(link => {
        const titleText = link.textContent.toLowerCase();
        if (titleText.includes(query)) {
          link.parentElement.style.display = '';
          visibleCount++;
        } else {
          link.parentElement.style.display = 'none';
        }
      });

      if (query.length > 0) {
        if (visibleCount > 0) {
          card.style.display = '';
          card.classList.add('is-open');
          trigger.setAttribute('aria-expanded', 'true');
          panel.style.maxHeight = panel.scrollHeight + "px";
        } else {
          card.style.display = 'none';
        }
      } else {
        card.style.display = '';
        card.classList.remove('is-open');
        trigger.setAttribute('aria-expanded', 'false');
        panel.style.maxHeight = null;
      }
    });
  });
}

window.onload = startSitemapFetch;
</script>

</body>
